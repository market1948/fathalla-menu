<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو فتح الله - Fathalla Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Libre+Barcode+39&display=swap" rel="stylesheet">
<style>
/* --- الألوان الملكية والفخمة المريحة للعين --- */
:root {
    --primary: #9E1B1E; /* أحمر كلاسيكي فخم */
    --secondary: #d5b895; /* بيج هادئ */
    --dark: #1A1A1A; /* أسود ملكي */
    --light: #F9F6F0; /* خلفية كريمية فاخرة ومريحة جداً */
    --accent: #E5A93B; /* ذهبي */
    --green: #2e8b57; 
    --gold: #D4AF37; /* ذهبي ملكي للتميز */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--light);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.4s ease, color 0.4s ease;
}

.menu-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 15px;
}

/* Header */
.header {
    text-align: center;
    padding: 40px 15px;
    background: linear-gradient(135deg, #1A1A1A 0%, #2A2A2A 50%, #111 100%);
    border-radius: 25px;
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.header::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 60%);
    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
    50% { transform: scale(1.2) rotate(5deg); opacity: 0.9; }
}

/* Navigation Tabs */
.nav-tabs {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px;
    padding: 15px; background: rgba(255,255,255,0.7); border-radius: 20px;
    backdrop-filter: blur(15px); box-shadow: 0 5px 25px rgba(0,0,0,0.08);
}

.nav-tab {
    padding: 10px 22px; border: none; border-radius: 30px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
    background: var(--dark); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.nav-tab:hover { transform: translateY(-3px) scale(1.05); }
.nav-tab.active { background: var(--primary); transform: scale(1.08); box-shadow: 0 6px 15px rgba(158, 27, 30, 0.4); }

.tab-offers {
    background: linear-gradient(45deg, var(--primary), var(--gold)) !important;
    border: 2px solid var(--gold) !important; color: #fff !important; transform: scale(1.05);
}

/* Section Content */
.section { display: none; animation: fadeInUp 0.5s ease; }
.section.active { display: block; }

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-header {
    text-align: center; padding: 20px; border-radius: 20px; margin-bottom: 25px;
    color: #fff; background: var(--primary); box-shadow: 0 5px 20px rgba(158, 27, 30, 0.3);
}
.section-header h2 { font-size: 2.2rem; font-weight: 900; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
.section-header .subtitle { font-size: 1rem; opacity: 0.9; font-weight: 600; }

/* Items Grid (تصميم الكروت الجديد والصغير) */
.items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
}

.item-card {
    background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.06);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.item-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); border-color: var(--gold); }

.item-name { font-size: 1.1rem; font-weight: 800; color: var(--dark); margin-bottom: 8px; line-height: 1.3; }
.item-desc { font-size: 0.85rem !important; color: #666 !important; margin: 5px 0 10px 0 !important; line-height: 1.4; font-weight: 600; }
.item-price { font-size: 1.3rem; font-weight: 900; color: var(--primary); margin-top: auto; }
.item-price .currency { font-size: 0.85rem; color: #888; font-weight: 600; }

.price-container { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.drinks-subsection { margin-bottom: 30px; }
.drinks-subsection h3 { color: var(--dark); font-size: 1.4rem; margin-bottom: 15px; padding-right: 15px; border-right: 4px solid var(--gold); font-weight: 800; }

/* Footer */
.footer {
    text-align: center; padding: 40px; margin-top: 40px; background: var(--dark);
    border-radius: 20px; color: #fff; position: relative;
}
.hotline-btn {
    font-size: 2rem; color: var(--gold); font-weight: 900; display: inline-block;
    padding: 10px 30px; background: rgba(255,255,255,0.1); border-radius: 20px;
    margin-top: 15px; text-decoration: none; transition: 0.3s; border: 1px solid rgba(212,175,55,0.3);
}
.hotline-btn:hover { transform: scale(1.05); background: rgba(212,175,55,0.2); }

/* أزرار السوشيال ميديا */
.social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
.social-btn {
    display: flex; align-items: center; justify-content: center; width: 50px; height: 50px;
    border-radius: 50%; text-decoration: none; transition: 0.3s;
}
.social-btn svg { width: 24px; height: 24px; fill: white; }
.social-btn:hover { transform: translateY(-5px) scale(1.1); }

.fb-btn { background: #1877F2; box-shadow: 0 4px 10px rgba(24, 119, 242, 0.4); }
.ig-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); box-shadow: 0 4px 10px rgba(225, 48, 108, 0.4); }
.tt-btn { background: #000; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); border: 1px solid #333; }
.yt-btn { background: #FF0000; box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4); }

/* --- تحسينات حجم الكروت والخط المخصصة لشاشات الجوال (2 أعمدة) --- */
@media (max-width: 768px) {
    .items-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .nav-tab { padding: 10px 15px; font-size: 0.9rem; }
    .section-header h2 { font-size: 1.8rem; }
    .item-card { padding: 12px; }
    .item-name { font-size: 1rem; margin-bottom: 5px; }
    .item-price { font-size: 1.15rem; }
    .item-price .currency { font-size: 0.75rem; }
    .item-desc { font-size: 0.75rem !important; margin: 4px 0 8px 0 !important; }
    .offers-banners-container { grid-template-columns: 1fr; }
    .hotline-btn { font-size: 1.6rem; padding: 10px 20px; }
}

.loading-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s;
}
.loading-text { color: var(--gold); font-size: 2rem; font-weight: 900; animation: pulse 1.5s infinite; }

/* تنسيقات الوضع الليلي */
body.dark-mode { background-color: #121212 !important; color: #e4e6eb !important; }
body.dark-mode .menu-container, body.dark-mode .header { background-color: #1A1A1A !important; }
body.dark-mode .nav-tabs { background-color: #2A2A2A !important; }
body.dark-mode .item-card { background: #1F1F1F !important; border-color: #333 !important; color: #e4e6eb; }
body.dark-mode .item-name, body.dark-mode .drinks-subsection h3 { color: #f0f0f0 !important; }
body.dark-mode .item-desc { color: #999 !important; }

/* --- تنسيقات سلة المشتريات --- */
#cart-count {
    position: absolute; top: -5px; right: -5px; background: #2e8b57; color: white;
    font-size: 12px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center; border: 2px solid #fff;
}
.toast {
    position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background-color: var(--green);
    color: white; padding: 12px 25px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: bottom 0.4s ease; z-index: 9999;
}
.barcode-font { font-family: 'Libre Barcode 39', cursive; font-size: 38px; color: var(--dark); margin-top: 10px; line-height: 1; }
body.dark-mode .barcode-font { color: #fff; }
</style>
