<style>
    @keyframes floatAndGlow {
        0%, 100% { transform: translateY(0); text-shadow: 0 0 8px rgba(255,255,255,0.4); }
        50% { transform: translateY(-4px); text-shadow: 0 0 15px rgba(255,255,255,1); }
    }
    .kitchen-title {
        text-align: center; 
        color: #ffffff; 
        font-size: 28px; 
        font-weight: 900; 
        margin-top: 20px; 
        letter-spacing: 3px; 
        font-family: Arial, sans-serif;
        animation: floatAndGlow 3s ease-in-out infinite; 
        transition: all 0.3s ease;
        display: inline-block; 
        cursor: pointer;
        /* مهم جداً: تثبيت الاتجاه من اليسار لليمين */
        direction: ltr;
    }
    .k-letter {
        position: relative;
        display: inline-block;
    }
    .chef-hat {
        position: absolute;
        top: -24px;
        left: 50%;
        transform: translateX(-50%) rotate(-15deg);
        width: 32px;
        height: 32px;
        fill: #ffffff;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        transition: all 0.3s ease;
    }
    .kitchen-title:hover {
        transform: scale(1.08);
        color: #ffcc00;
        text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
    }
    .kitchen-title:hover .chef-hat {
        fill: #ffcc00;
        transform: translateX(-50%) rotate(0deg) scale(1.1);
        top: -28px;
    }
</style>

<!-- العنصر المُحسَّن -->
<div class="kitchen-title">
    <span class="k-letter">
        <svg class="chef-hat" viewBox="0 0 24 24">
            <path d="M7 15h10v4a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-4zm11-2c1.66 0 3-1.34 3-3s-1.34-3-3-3c-.15 0-.29.02-.43.05A4.996 4.996 0 0 0 12 2a4.996 4.996 0 0 0-5.57 5.05C6.29 7.02 6.15 7 6 7c-1.66 0-3 1.34-3 3s1.34 3 3 3h12z"/>
        </svg>
        K
    </span>
    ITCHEN MENU
</div>
